<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campeonato FIFA TD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="assets/logo-TD-branco.png" alt="TD" class="logo">
      <div class="title-group">
        <h1>Campeonato FIFA TD</h1>
        <p class="subtitle">Fase de grupos + mata-mata · ao vivo</p>
      </div>
    </div>
    <div class="status-bar">
      <span class="dot" id="live-dot"></span>
      <span id="last-update">carregando...</span>
    </div>
  </header>

  <main>
    <!-- ===================== FASE DE GRUPOS ===================== -->
    <section class="stage">
      <h2 class="stage-title">Fase de Grupos</h2>
      <div class="groups">
        <div class="group-block" data-group="A">
          <h3 class="group-title"><span class="group-tag tag-a">Grupo A</span></h3>
          <div class="standings-wrap" id="standings-A"></div>
          <details class="group-games">
            <summary>Jogos do Grupo A</summary>
            <div class="matches" id="games-A"></div>
          </details>
        </div>

        <div class="group-block" data-group="B">
          <h3 class="group-title"><span class="group-tag tag-b">Grupo B</span></h3>
          <div class="standings-wrap" id="standings-B"></div>
          <details class="group-games">
            <summary>Jogos do Grupo B</summary>
            <div class="matches" id="games-B"></div>
          </details>
        </div>
      </div>
      <p class="legend"><span class="legend-dot"></span> 4 primeiros de cada grupo avançam para o mata-mata</p>
    </section>

    <!-- ===================== MATA-MATA ===================== -->
    <section class="stage">
      <h2 class="stage-title">Mata-mata</h2>
      <div class="knockout">
        <div class="ko-phase">
          <h3 class="phase-title">Quartas</h3>
          <div class="matches" id="matches-quartas"></div>
        </div>
        <div class="ko-phase">
          <h3 class="phase-title">Semifinais</h3>
          <div class="matches" id="matches-semis"></div>
        </div>
        <div class="ko-phase">
          <h3 class="phase-title">Final</h3>
          <div class="matches" id="matches-final"></div>
          <h3 class="phase-title phase-title-3rd">3º lugar</h3>
          <div class="matches" id="matches-terceiro"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>Atualização automática a cada 20s · <a href="#" id="refresh-now">atualizar agora</a></p>
  </footer>

  <template id="match-template">
    <article class="match">
      <div class="match-header">
        <span class="match-id"></span>
        <span class="match-status"></span>
      </div>
      <div class="match-body">
        <div class="team team-1">
          <div class="team-info">
            <img class="club-crest" alt="" hidden>
            <span class="team-name"></span>
          </div>
          <span class="team-score"></span>
        </div>
        <div class="team team-2">
          <div class="team-info">
            <img class="club-crest" alt="" hidden>
            <span class="team-name"></span>
          </div>
          <span class="team-score"></span>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
